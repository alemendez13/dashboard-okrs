<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de OKRs y Desempeño</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para gráficas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide-react@latest/dist/lucide-react.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* gray-50 */
        }
        .active-nav {
            background-color: #e0f2fe; /* sky-100 */
            color: #0c4a6e; /* sky-900 */
            font-weight: 600;
        }
        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            gap: 1rem;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="bg-gray-100">

    <div id="login-container" class="flex items-center justify-center min-h-screen">
        <div class="w-full max-w-md p-8 space-y-6 bg-white rounded-xl shadow-lg">
            <div class="text-center">
                <img src="logo.png" alt="Logo de SANSCE" class="w-auto h-12 mx-auto">
                <h2 class="mt-6 text-2xl font-bold text-gray-900">Iniciar Sesión</h2>
                <p class="mt-2 text-sm text-gray-600">Ingresa a tu dashboard de OKRs y Desempeño</p>
            </div>
            <form id="login-form" class="space-y-6">
                <div>
                    <label for="email" class="text-sm font-medium text-gray-700">Correo Electrónico</label>
                    <input id="email" name="email" type="email" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-sky-500 focus:border-sky-500" placeholder="tu@email.com">
                </div>
                <div>
                    <label for="password" class="text-sm font-medium text-gray-700">Contraseña</label>
                    <input id="password" name="password" type="password" required class="w-full px-3 py-2 mt-1 border border-gray-300 rounded-md shadow-sm focus:ring-sky-500 focus:border-sky-500" placeholder="••••••••">
                </div>
                <div>
                    <button type="submit" class="w-full px-4 py-2 font-semibold text-white bg-sky-600 rounded-md hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500">
                        Ingresar
                    </button>
                </div>
                <p id="login-error" class="text-sm text-center text-red-600"></p>
            </form>
        </div>
    </div>

    <div id="app-container" class="flex h-screen overflow-hidden" style="display: none;">
        <aside class="w-64 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col">
            <div class="h-16 flex items-center justify-center px-6 border-b border-gray-200">
                <img src="logo.png" alt="Logo de SANSCE" class="h-10 w-auto">
            </div>
            <nav class="flex-1 overflow-y-auto pt-6">
                <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Tableros</p>
                <ul class="px-4 mt-2 space-y-2">
                    <li><a href="#" id="nav-dashboard" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 active-nav">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                        Dashboard General
                    </a></li>
                    <li><a href="#" id="nav-tactical" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 8v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                        Vista Táctica
                    </a></li>
                    <li><a href="#" id="nav-personal" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                        Mi Tablero Personal
                    </a></li>
                </ul>
                <p class="mt-8 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Gestión</p>
                <ul class="px-4 mt-2 space-y-2">
                    <li><a href="#" id="nav-assignments" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                        Mis Asignaciones
                    </a></li>
                    <li><a href="#" id="nav-catalog" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                        Catálogo
                    </a></li>
                    <li><a href="#" id="nav-admin" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                        Administración
                    </a></li>
                </ul>
            </nav>
            <div class="p-4 border-t border-gray-200">
                <div id="user-profile" class="flex items-center">
                    </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto">
            <header class="h-16 flex items-center justify-between px-8 border-b border-gray-200 bg-white sticky top-0">
                <h1 id="view-title" class="text-xl font-semibold text-gray-900">Cargando...</h1>
            </header>
            <div id="main-content" class="p-8">
                <div id="loader">
                     <svg class="animate-spin h-8 w-8 text-sky-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24"><circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle><path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path></svg>
                    <p class="text-gray-600">Cargando...</p>
                </div>
            </div>
        </main>
    </div>

<script>
    // =================================================================================
    // === CONFIGURACIÓN Y ESTADO DE LA APLICACIÓN ===
    // =================================================================================
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxQjTjmXv-JYE4Yh77UWtLDPIhXUwXq1zZjaf5S453B7YlHRvqCJVCuWY7-ELpHF4GK/exec'; // Reemplaza con tu URL de Apps Script
    let appData = {};
    let currentUserId = null;
    let chartInstances = {};

    const mainContent = document.getElementById('main-content');
    const loginForm = document.getElementById('login-form');
    const appContainer = document.getElementById('app-container');
    const loader = document.getElementById('loader');

    // =================================================================================
    // === LÓGICA DE DATOS Y UTILIDADES ===
    // =================================================================================
    
    async function fetchData() {
        try {
            loader.style.display = 'flex';
            const response = await fetch(SCRIPT_URL);
            if (!response.ok) throw new Error(`Error en la red: ${response.statusText}`);
            const data = await response.json();
            if (data.error) throw new Error(`Error en el script: ${data.error}`);
            appData = data;
            return true;
        } catch (error) {
            console.error('Error al cargar los datos:', error);
            mainContent.innerHTML = `<p class="text-red-500 text-center">Error al cargar los datos. Por favor, recarga la página.</p>`;
            return false;
        } finally {
            loader.style.display = 'none';
        }
    }

    /**
     * FUNCIÓN MEJORADA: Da formato a un valor según su unidad ($ o %).
     */
    function formatKpiValue(value, unit) {
        if (value === null || value === undefined || isNaN(value)) {
            return 'N/A';
        }
        if (unit === '$') {
            return new Intl.NumberFormat('es-MX', { style: 'currency', currency: 'MXN' }).format(value);
        }
        if (unit === '%') {
            // Asumimos que los valores de % ya vienen en su forma decimal (ej. 0.9 para 90%)
            return `${(value * 100).toFixed(1)}%`;
        }
        // Para números sin unidad específica
        return new Intl.NumberFormat('es-MX').format(value);
    }

    // =================================================================================
    // === LÓGICA DE AUTENTICACIÓN Y CONTEXTO DE USUARIO ===
    // =================================================================================

    function handleLogin(event) {
        event.preventDefault();
        const email = document.getElementById('email').value;
        const password = document.getElementById('password').value;
        const user = appData.users.find(u => u.Email === email && u.Contraseña == password);
        if (user) {
            currentUserId = user.ID_Usuario;
            sessionStorage.setItem('currentUserId', currentUserId);
            appContainer.style.display = 'flex';
            loginForm.parentElement.style.display = 'none';
            initializeApp();
        } else {
            alert('Correo o contraseña incorrectos.');
        }
    }

    function handleLogout() {
        currentUserId = null;
        sessionStorage.removeItem('currentUserId');
        appContainer.style.display = 'none';
        loginForm.parentElement.style.display = 'flex';
    }

    function updateUserContext(userId) {
        const currentUser = appData.users.find(u => u.ID_Usuario == userId);
        const userAvatar = document.getElementById('user-avatar');
        if (currentUser && userAvatar) {
            userAvatar.innerHTML = `
                <img class="w-10 h-10 rounded-full" src="https://ui-avatars.com/api/?name=${encodeURIComponent(currentUser.Nombre_Completo)}&background=random" alt="User avatar">
                <div class="ml-3">
                    <p class="text-sm font-semibold text-gray-800">${currentUser.Nombre_Completo}</p>
                    <a href="#" id="logout-link" class="text-xs text-gray-500 hover:text-sky-600">Cerrar sesión</a>
                </div>`;
            document.getElementById('logout-link').addEventListener('click', handleLogout);
        }
    }
    
    // =================================================================================
    // === LÓGICA DE RENDERIZADO DE VISTAS ===
    // =================================================================================

    /**
     * FUNCIÓN MEJORADA: Crea la tarjeta para un KPI individual.
     * Ahora calcula y formatea correctamente según la nueva columna 'Metodo_Agregacion'.
     */
    function createKpiCard(kpi) {
        const resultsForKpi = appData.results.filter(r => r.ID_KPI === kpi.ID_KPI);
        if (!resultsForKpi.length) return ''; // No mostrar tarjeta si no hay resultados

        const groupedByMonth = resultsForKpi.reduce((acc, r) => {
            const month = new Date(r.Fecha).getMonth();
            if (!acc[month]) acc[month] = [];
            acc[month].push(r.Valor);
            return acc;
        }, {});

        const currentMonth = new Date().getMonth();
        const monthlyValues = groupedByMonth[currentMonth] || [];
        
        // --- INICIO DE LA LÓGICA MEJORADA ---
        let currentValue;
        const aggregationMethod = kpi.Metodo_Agregacion; // Leemos el nuevo campo

        if (monthlyValues.length > 0) {
            if (aggregationMethod === 'SUMAR') {
                // Suma los valores para KPIs como Facturación
                currentValue = monthlyValues.reduce((sum, value) => sum + value, 0);
            } else {
                // Promedia los valores para KPIs como Nivel de Servicio
                currentValue = monthlyValues.reduce((sum, value) => sum + value, 0) / monthlyValues.length;
            }
        } else {
            currentValue = 0;
        }
        
        const progress = kpi.Meta ? (currentValue / kpi.Meta) : 0;
        const progressBarColor = progress >= 0.8 ? 'bg-green-500' : progress >= 0.5 ? 'bg-yellow-500' : 'bg-red-500';
        // --- FIN DE LA LÓGICA MEJORADA ---

        return `
            <div class="bg-white p-4 rounded-lg shadow-sm border border-gray-200">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-gray-500">${kpi.Nombre_KPI}</span>
                    <span class="text-xs bg-sky-100 text-sky-800 px-2 py-1 rounded-full">${kpi.Frecuencia}</span>
                </div>
                <div class="mt-2">
                    <p class="text-3xl font-bold text-gray-800">${formatKpiValue(currentValue, kpi.Unidad)}</p>
                    <p class="text-sm text-gray-500">Meta: ${formatKpiValue(kpi.Meta, kpi.Unidad)}</p>
                </div>
                <div class="mt-4">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-sm font-medium text-gray-700">Progreso</span>
                        <span class="text-sm font-medium text-gray-700">${(progress * 100).toFixed(1)}%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-2.5">
                        <div class="${progressBarColor} h-2.5 rounded-full" style="width: ${Math.min(progress * 100, 100)}%"></div>
                    </div>
                </div>
            </div>
        `;
    }

    function renderDashboard() {
        const strategicKpis = appData.kpis.filter(kpi => 
            appData.keyResults.some(kr => kr.ID_Resultado_Clave === kpi.ID_Resultado_Clave && 
                appData.objectives.some(obj => obj.ID_Objetivo === kr.ID_Objetivo_Asociado)
            )
        );
        mainContent.innerHTML = `
            <h1 class="text-2xl font-bold text-gray-800 mb-6">Dashboard Estratégico</h1>
            <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
                ${strategicKpis.map(createKpiCard).join('')}
            </div>
        `;
    }

    // (Aquí irían las demás funciones de renderizado: renderTacticalView, renderPersonalView, etc. que puedes desarrollar en el futuro)
    function renderTacticalView() { mainContent.innerHTML = '<h1 class="text-2xl font-bold text-gray-800">Vista Táctica (En construcción)</h1>'; }
    function renderPersonalView() { mainContent.innerHTML = '<h1 class="text-2xl font-bold text-gray-800">Mi Desempeño (En construcción)</h1>'; }
    function renderMyAssignmentsView() { mainContent.innerHTML = '<h1 class="text-2xl font-bold text-gray-800">Mis Asignaciones (En construcción)</h1>'; }
    function renderCatalogView() { mainContent.innerHTML = '<h1 class="text-2xl font-bold text-gray-800">Catálogo (En construcción)</h1>'; }
    function renderAdminView() { mainContent.innerHTML = '<h1 class="text-2xl font-bold text-gray-800">Administración (En construcción)</h1>'; }

    // =================================================================================
    // === INICIALIZACIÓN DE LA APLICACIÓN ===
    // =================================================================================

    function initializeApp() {
        const navLinks = { 
            'nav-dashboard': renderDashboard, 
            'nav-tactical': renderTacticalView, 
            'nav-personal': renderPersonalView, 
            'nav-assignments': renderMyAssignmentsView, 
            'nav-catalog': renderCatalogView, 
            'nav-admin': renderAdminView 
        };
        const allNavItems = document.querySelectorAll('nav a');
        
        function setActiveNav(id) {
            allNavItems.forEach(link => link.classList.remove('active-nav'));
            document.getElementById(id)?.classList.add('active-nav');
        }

        Object.keys(navLinks).forEach(id => {
            const link = document.getElementById(id);
            if(link) {
                link.addEventListener('click', (e) => { 
                    e.preventDefault(); 
                    navLinks[id](); 
                    setActiveNav(id); 
                });
            }
        });
        updateUserContext(currentUserId);
        renderDashboard(); 
        setActiveNav('nav-dashboard');
    }

    document.addEventListener('DOMContentLoaded', async () => {
        const success = await fetchData();
        if (success) {
            loginForm.addEventListener('submit', handleLogin);
            const storedUserId = sessionStorage.getItem('currentUserId');
            if (storedUserId) {
                currentUserId = storedUserId;
                appContainer.style.display = 'flex';
                loginForm.parentElement.style.display = 'none';
                initializeApp();
            }
        }
    });
</script>

</body>
</html>
