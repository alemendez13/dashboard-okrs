<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de Desempeño</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="loader" class="fixed inset-0 bg-white/80 backdrop-blur-sm z-50 flex items-center justify-center">
        <div class="loader-spinner"></div>
    </div>

    <div id="login-view" class="min-h-screen bg-gray-100 flex items-center justify-center p-4">
        <div class="w-full max-w-md bg-white rounded-lg shadow-md p-8">
            <h2 class="text-2xl font-bold text-center text-gray-800 mb-6">Iniciar Sesión</h2>
            <form id="login-form">
                <div class="mb-4">
                    <label for="email" class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500" required>
                </div>
                <div class="mb-6">
                    <label for="password" class="block text-sm font-medium text-gray-700">Contraseña</label>
                    <input type="password" id="password" class="mt-1 block w-full px-3 py-2 border border-gray-300 rounded-md shadow-sm focus:outline-none focus:ring-sky-500 focus:border-sky-500" required>
                </div>
                <button type="submit" class="w-full bg-sky-600 text-white py-2 px-4 rounded-md hover:bg-sky-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-sky-500">
                    Entrar
                </button>
                <p id="error-message" class="text-red-500 text-sm mt-4 text-center"></p>
            </form>
        </div>
    </div>

    <div id="app-view" class="hidden">
        <div class="flex h-screen bg-gray-100">
            <!-- Barra Lateral de Navegación -->
            <aside class="w-64 bg-white border-r border-gray-200 flex flex-col">
                <!-- Encabezado Unificado con Logo y Título -->
                <div class="h-20 flex flex-col items-center justify-center border-b border-gray-200 px-4">
                    <!-- IMPORTANTE: Reemplaza esta URL con la URL real de tu logotipo -->
                    <img src="logo.png" alt="Logotipo de la Empresa" class="h-8 mb-1">
                    <h1 class="text-lg font-bold text-sky-800">Gestión OKR</h1>
                </div>

                <nav class="flex-1 px-4 py-6 space-y-2">
                    <a href="#" id="nav-dashboard" class="flex items-center px-4 py-2 text-gray-700 rounded-md hover:bg-gray-100">Dashboard</a>
                    <a href="#" id="nav-tactical" class="flex items-center px-4 py-2 text-gray-700 rounded-md hover:bg-gray-100">Vista Táctica</a>
                    <a href="#" id="nav-personal" class="flex items-center px-4 py-2 text-gray-700 rounded-md hover:bg-gray-100">Mi Tablero</a>
                    <a href="#" id="nav-admin" class="hidden flex items-center px-4 py-2 text-gray-700 rounded-md hover:bg-gray-100">Admin</a>
                </nav>
                <div id="user-pill" class="p-4 border-t border-gray-200 flex items-center"></div>
            </aside>

            <main class="flex-1 flex flex-col overflow-hidden">
                <header class="h-16 bg-white border-b border-gray-200 flex items-center justify-between px-6">
                    <h2 id="view-title" class="text-xl font-semibold text-gray-800"></h2>
                    <div id="frequency-filter" class="flex items-center space-x-2">
                        <button data-freq="semanal" class="freq-btn px-3 py-1 text-sm font-medium rounded-md">Semanal</button>
                        <button data-freq="mensual" class="freq-btn px-3 py-1 text-sm font-medium rounded-md">Mensual</button>
                        <button data-freq="anual" class="freq-btn px-3 py-1 text-sm font-medium rounded-md">Anual</button>
                    </div>
                </header>
                <div id="main-content" class="flex-1 overflow-y-auto p-6">
                    </div>
            </main>
        </div>
    </div>
    
    <script src="app.js" defer></script>
</body>
</html>
