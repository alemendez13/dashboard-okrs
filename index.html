<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard de OKRs y Desempeño</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Chart.js para gráficas -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide-react@latest/dist/lucide-react.js"></script>
    <!-- Google Fonts: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc; /* gray-50 */
        }
        .active-nav {
            background-color: #e0f2fe; /* sky-100 */
            color: #0c4a6e; /* sky-900 */
            font-weight: 600;
        }
        #loader {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            gap: 1rem;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <!-- Barra de Navegación Lateral -->
    <aside class="w-64 flex-shrink-0 bg-white border-r border-gray-200 flex flex-col">
        <div class="h-16 flex items-center justify-center px-6 border-b border-gray-200">
            <img src="logo.png" alt="Logo de SANSCE" class="h-10 w-auto">
        </div>
        <nav class="flex-1 overflow-y-auto pt-6">
            <p class="px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Tableros</p>
            <ul class="px-4 mt-2 space-y-2">
                <li><a href="#" id="nav-dashboard" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100 active-nav">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"></path></svg>
                    Dashboard General
                </a></li>
                <li><a href="#" id="nav-tactical" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 8v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"></path></svg>
                    Vista Táctica
                </a></li>
                <li><a href="#" id="nav-personal" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                    Mi Tablero Personal
                </a></li>
            </ul>
             <p class="mt-8 px-4 text-xs font-semibold text-gray-400 uppercase tracking-wider">Gestión</p>
            <ul class="px-4 mt-2 space-y-2">
                 <li><a href="#" id="nav-assignments" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2m-6 9l2 2 4-4"></path></svg>
                    Mis Asignaciones
                </a></li>
                <li><a href="#" id="nav-catalog" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h7"></path></svg>
                    Catálogo
                </a></li>
                <li><a href="#" id="nav-admin" class="flex items-center gap-3 px-4 py-2.5 rounded-lg text-gray-600 hover:bg-gray-100">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                    Administración
                </a></li>
            </ul>
        </nav>
        <div class="p-4 border-t border-gray-200">
            <div id="user-profile" class="flex items-center">
                <!-- User profile will be dynamically inserted here -->
            </div>
        </div>
    </aside>

    <!-- Contenido Principal -->
    <main class="flex-1 overflow-y-auto">
        <header class="h-16 flex items-center justify-between px-8 border-b border-gray-200 bg-white sticky top-0">
            <h1 id="view-title" class="text-xl font-semibold text-gray-900">Cargando...</h1>
        </header>

        <div id="main-content" class="p-8">
            <div id="loader">
                <svg class="animate-spin h-8 w-8 text-sky-600" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
                </svg>
                <p class="text-gray-600">Obteniendo datos desde Google Sheets...</p>
            </div>
        </div>
    </main>

<script>
    // --- CONEXIÓN A GOOGLE SHEETS ---
    const GOOGLE_SHEET_API_URL = 'https://script.google.com/macros/s/AKfycbzINRjrsSq9pe_l-f2cdajWejNfJADQ79tkQ01mBGZ_Kg5tHXuk308373LtIzDOfd5f/exec'; 

    let appData = {};
    let currentUserId = 2; // Iniciar como Alejandra (admin)
    let currentUser = {};
    let isAdmin = false;

    async function fetchData() {
        try {
            const response = await fetch(GOOGLE_SHEET_API_URL);
            if (!response.ok) throw new Error('Respuesta de red no fue exitosa. Verifica la URL y los permisos del script.');
            
            const rawData = await response.json();
            console.log("Datos recibidos de Google Sheet:", rawData); // Ayuda para depurar
            appData = processRawData(rawData);
            initializeApp();

        } catch (error) {
            document.getElementById('main-content').innerHTML = `<div class="text-center p-10 bg-red-50 border border-red-200 rounded-lg"><h3 class="font-semibold text-red-800">Error de Conexión</h3><p class="mt-2 text-red-700">${error.message}</p><p class="mt-2 text-sm text-red-600">Asegúrate de haber publicado tu script con acceso para 'Cualquier persona' y que los nombres de las pestañas en tu Google Sheet sean correctos (ej. 'Resultados_Clave').</p></div>`;
        }
    }
    
    function processRawData(data) {
        const expectedKeys = ['users', 'objectives', 'keyResults', 'processes', 'kpis', 'results'];
        const cleanData = {};

        expectedKeys.forEach(key => {
            if (data[key] && Array.isArray(data[key])) {
                cleanData[key] = data[key].filter(row => row && Object.values(row).some(val => val !== null && val !== ''));
            } else {
                cleanData[key] = []; // Si una lista no viene, se crea vacía para evitar errores
            }
        });
        
        cleanData.kpis = cleanData.kpis.map(kpi => ({
            ...kpi,
            Meta: parseFloat(kpi.Meta) || 0,
            Es_Financiero: String(kpi.Es_Financiero).toLowerCase() === 'verdadero'
        }));

        cleanData.results = cleanData.results.map(res => ({
            ...res,
            Valor: parseFloat(res.Valor) || 0
        }));

        return cleanData;
    }

    // --- RENDER FUNCTIONS ---
    function renderDashboard() {
        const content = document.getElementById('main-content');
        document.getElementById('view-title').textContent = 'Dashboard General';
        if (!appData.objectives.length) {
            content.innerHTML = `<div class="text-center p-10 bg-white rounded-lg border"><p class="text-gray-500">No se encontraron objetivos para mostrar.</p></div>`;
            return;
        }

        let html = '<div class="space-y-4">'; 
        appData.objectives.forEach(obj => {
            const keyResults = appData.keyResults.filter(kr => kr.ID_Objetivo_Asociado === obj.ID_Objetivo);
            let totalProgress = 0;
            let krCount = 0;

            keyResults.forEach(kr => {
                const kpis = appData.kpis.filter(kpi => kpi.ID_Resultado_C === kr.ID_Resultado_Clave);
                if (kpis.length > 0) {
                    const krProgress = kpis.reduce((acc, kpi) => {
                        const results = appData.results.filter(r => r.ID_KPI === kpi.ID_KPI);
                        const lastResult = results.length > 0 ? results.sort((a,b) => new Date(b.Fecha) - new Date(a.Fecha))[0].Valor : 0;
                        return acc + (kpi.Meta > 0 ? (lastResult / kpi.Meta) : 0);
                    }, 0) / kpis.length;
                    totalProgress += krProgress;
                    krCount++;
                }
            });

            const avgProgress = krCount > 0 ? Math.min((totalProgress / krCount) * 100, 100) : 0;
            
            html += `
                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                    <button class="w-full text-left p-5 hover:bg-gray-50 accordion-toggle">
                        <div class="flex justify-between items-center">
                            <h3 class="text-lg font-semibold text-gray-800">${obj.Nombre_Objetivo}</h3>
                            <div class="flex items-center gap-4">
                                <div class="w-40">
                                    <div class="flex justify-between items-center mb-1"><span class="text-xs font-medium text-sky-700">Progreso</span><span class="text-xs font-bold text-sky-700">${avgProgress.toFixed(1)}%</span></div>
                                    <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-sky-500 h-2 rounded-full" style="width: ${avgProgress.toFixed(1)}%"></div></div>
                                </div>
                                <svg class="w-5 h-5 text-gray-500 transition-transform transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                            </div>
                        </div>
                    </button>
                    <div class="accordion-content hidden p-6 pt-0 border-t border-gray-200">
                        <p class="mt-4 mb-2 text-sm font-semibold text-gray-600">Resultados Clave:</p>
                        <div class="space-y-5">`;

            keyResults.forEach(kr => {
                const kpis = appData.kpis.filter(kpi => kpi.ID_Resultado_C === kr.ID_Resultado_Clave); 
                 let current = 0, target = 0;
                 let isFinancial = false;
                 let unit = '';

                 kpis.forEach(kpi => {
                     const results = appData.results.filter(r => r.ID_KPI === kpi.ID_KPI);
                     current += results.length > 0 ? results.sort((a,b) => new Date(b.Fecha) - new Date(a.Fecha))[0].Valor : 0;
                     target += kpi.Meta;
                     if(kpi.Es_Financiero) isFinancial = true;
                     unit = kpi.Unidad;
                 });

                const progress = target > 0 ? Math.min((current / target) * 100, 100) : 0;
                let metaDetails;

                if (isFinancial && !isAdmin) {
                    metaDetails = `Progreso: <span class="font-semibold">${progress.toFixed(1)}%</span>`;
                } else {
                    const formatOptions = unit === '$' ? { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 } : {};
                    metaDetails = `Meta: ${target.toLocaleString('es-MX', formatOptions)} | Actual: ${current.toLocaleString('es-MX', formatOptions)}`;
                }

                html += `
                    <div>
                        <div class="flex justify-between items-center mb-1"><p class="font-medium text-gray-700">${kr.Nombre_Resultado_Clave}</p><p class="text-sm text-gray-500">${metaDetails}</p></div>
                        <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-teal-500 h-2 rounded-full" style="width: ${progress.toFixed(1)}%"></div></div>
                    </div>`;
            });
            
            html += `</div></div></div>`;
        });

        html += '</div>';
        content.innerHTML = html;
        addAccordionListeners();
    }
    
    function renderTacticalView() {
        const content = document.getElementById('main-content');
        document.getElementById('view-title').textContent = 'Vista Táctica (Por Proceso)';
        if (!appData.processes.length) {
            content.innerHTML = `<div class="text-center p-10 bg-white rounded-lg border"><p class="text-gray-500">No hay procesos para mostrar.</p></div>`;
            return;
        }

        let html = '<div class="space-y-4">';
        appData.processes.forEach(process => {
            html += `
                <div class="bg-white rounded-xl border border-gray-200 overflow-hidden">
                    <button class="w-full text-left p-5 flex justify-between items-center hover:bg-gray-50 accordion-toggle">
                        <div>
                            <h3 class="text-lg font-semibold text-gray-800">${process.Nombre_Proceso}</h3>
                            <p class="text-sm text-gray-500 mt-1">Dueño: ${process.Dueño_Proceso}</p>
                        </div>
                        <svg class="w-5 h-5 text-gray-500 transition-transform transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
                    </button>
                    <div class="accordion-content hidden p-6 pt-0 border-t border-gray-200">
                        <div class="mt-4 space-y-4">`;

            const processKpis = appData.kpis.filter(kpi => kpi.ID_Proceso_Asc && process.ID_Proceso && kpi.ID_Proceso_Asc.trim() === process.ID_Proceso.trim());
            if(processKpis.length > 0) {
                processKpis.forEach(kpi => {
                    const results = appData.results.filter(r => r.ID_KPI === kpi.ID_KPI);
                    const current = results.length > 0 ? results.sort((a,b) => new Date(b.Fecha) - new Date(a.Fecha))[0].Valor : 0;
                    const target = kpi.Meta;
                    const progress = target > 0 ? Math.min((current / target) * 100, 100) : 0;
                    
                    let metaDetails;
                    if (kpi.Es_Financiero && !isAdmin) {
                        metaDetails = `${progress.toFixed(1)}%`;
                    } else {
                        const formatOptions = kpi.Unidad === '$' ? { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 } : {};
                        metaDetails = `${current.toLocaleString('es-MX', formatOptions)} / ${target.toLocaleString('es-MX', formatOptions)}`;
                    }

                    html += `
                        <div>
                            <div class="flex justify-between items-center text-sm mb-1"><span class="font-medium text-gray-700">${kpi.Nombre_KPI}</span><span class="font-semibold text-gray-600">${metaDetails}</span></div>
                            <div class="w-full bg-gray-200 rounded-full h-2"><div class="bg-cyan-500 h-2 rounded-full" style="width: ${progress}%"></div></div>
                        </div>`;
                });
            } else {
                 html += `<p class="text-sm text-gray-500">No hay KPIs asociados a este proceso.</p>`;
            }

            html += `</div></div></div>`;
        });
        html += '</div>';
        content.innerHTML = html;
        addAccordionListeners();
    }
    
    function renderPersonalView() {
         const content = document.getElementById('main-content');
         document.getElementById('view-title').textContent = 'Mi Tablero Personal';
         content.innerHTML = `<div class="text-center p-10 bg-white rounded-lg border"><p class="text-gray-500">Vista "Mi Tablero Personal" en construcción.</p></div>`;
    }

    function renderMyAssignmentsView() {
        const content = document.getElementById('main-content');
        document.getElementById('view-title').textContent = 'Mis Asignaciones';
        const assignedKpis = appData.kpis.filter(kpi => kpi.ID_Usuario_Res == currentUserId);

        if (assignedKpis.length === 0) {
            content.innerHTML = `<div class="text-center p-10 bg-white rounded-lg border"><p class="text-gray-500">No tienes KPIs asignados.</p></div>`;
            return;
        }

        let html = `<div class="bg-white rounded-xl border border-gray-200 shadow-sm"><div class="overflow-x-auto"><table class="w-full text-sm text-left text-gray-500"><thead class="text-xs text-gray-700 uppercase bg-gray-50"><tr><th scope="col" class="px-6 py-3">Nombre del KPI</th><th scope="col" class="px-6 py-3">Frecuencia</th><th scope="col" class="px-6 py-3">Meta</th></tr></thead><tbody>`;
        
        assignedKpis.forEach(kpi => {
            let metaDisplay;
            if (kpi.Es_Financiero && !isAdmin) {
                metaDisplay = `Objetivo de Progreso`;
            } else {
                const formatOptions = kpi.Unidad === '$' ? { style: 'currency', currency: 'MXN', minimumFractionDigits: 0 } : {};
                metaDisplay = `${kpi.Meta.toLocaleString('es-MX', formatOptions)} ${kpi.Unidad === '$' ? '' : kpi.Unidad}`;
            }
            html += `<tr class="bg-white border-b hover:bg-gray-50"><th scope="row" class="px-6 py-4 font-medium text-gray-900 whitespace-nowrap">${kpi.Nombre_KPI}</th><td class="px-6 py-4">${kpi.Frecuencia}</td><td class="px-6 py-4">${metaDisplay}</td></tr>`;
        });

        html += `</tbody></table></div></div>`;
        content.innerHTML = html;
    }

    function renderCatalogView() {
         const content = document.getElementById('main-content');
         document.getElementById('view-title').textContent = 'Catálogo';
         content.innerHTML = `<div class="text-center p-10 bg-white rounded-lg border"><p class="text-gray-500">Vista "Catálogo" en construcción.</p></div>`;
    }
    
    function renderAdminView() {
         const content = document.getElementById('main-content');
         document.getElementById('view-title').textContent = 'Administración';
         content.innerHTML = `<div class="text-center p-10 bg-white rounded-lg border"><p class="text-gray-500">Vista "Administración" en construcción.</p></div>`;
    }

    function addAccordionListeners() {
        document.querySelectorAll('.accordion-toggle').forEach(button => {
            button.addEventListener('click', (event) => {
                const content = button.nextElementSibling;
                const icon = button.querySelector('svg');
                if (content && icon) {
                    content.classList.toggle('hidden');
                    icon.classList.toggle('rotate-180');
                }
            });
        });
    }

    function updateUserContext(userId) {
        currentUserId = userId;
        currentUser = appData.users.find(u => u.ID_Usuario == currentUserId) || {};
        isAdmin = currentUser.Rol === 'admin';

        const adminNav = document.getElementById('nav-admin');
        if (adminNav) adminNav.style.display = isAdmin ? 'flex' : 'none';
        
        const profileDiv = document.getElementById('user-profile');
        if(profileDiv && currentUser) {
            profileDiv.innerHTML = `
                <img class="h-10 w-10 rounded-full object-cover" src="${currentUser.Avatar || `https://placehold.co/100x100/e2e8f0/475569?text=${currentUser.Nombre_Completo ? currentUser.Nombre_Completo.charAt(0) : 'U'}`}" alt="User avatar">
                <div class="ml-3"><p class="text-sm font-semibold text-gray-800">${currentUser.Nombre_Completo || 'Usuario'}</p><a href="#" id="logout-link" class="text-xs text-gray-500 hover:text-sky-600">Cerrar sesión</a></div>`;
        }
    }

    function initializeApp() {
        const navLinks = {
            'nav-dashboard': renderDashboard,
            'nav-tactical': renderTacticalView,
            'nav-personal': renderPersonalView,
            'nav-assignments': renderMyAssignmentsView,
            'nav-catalog': renderCatalogView,
            'nav-admin': renderAdminView,
        };
        const allNavItems = document.querySelectorAll('nav a');

        function setActiveNav(id) {
            allNavItems.forEach(link => link.classList.remove('active-nav'));
            document.getElementById(id)?.classList.add('active-nav');
        }

        Object.keys(navLinks).forEach(id => {
            const link = document.getElementById(id);
            if(link) {
                link.addEventListener('click', (e) => {
                    e.preventDefault();
                    navLinks[id]();
                    setActiveNav(id);
                });
            }
        });
        
        updateUserContext(currentUserId);
        renderDashboard();
    }

    document.addEventListener('DOMContentLoaded', () => {
        fetchData();
    });
</script>
</body>
</html>
